services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: runtime_observer
      POSTGRES_USER: runtime_observer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runtime_observer -d runtime_observer"]
      interval: 10s
      timeout: 5s
      retries: 10

  collector:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app/collector
    depends_on:
      db:
        condition: service_healthy
    environment:
      RUNTIME_OBSERVER_HOST: 0.0.0.0
      RUNTIME_OBSERVER_PORT: 4319
      RUNTIME_OBSERVER_DATABASE_URL: ${RUNTIME_OBSERVER_DATABASE_URL:?RUNTIME_OBSERVER_DATABASE_URL is required}
      RUNTIME_OBSERVER_INSECURE_DEV: "false"
      RUNTIME_OBSERVER_RETENTION_DAYS: "7"
      RUNTIME_OBSERVER_REGULAR_LOG_RETENTION_HOURS: "4"
      RUNTIME_OBSERVER_RAW_EVENT_RETENTION_HOURS: "24"
      RUNTIME_OBSERVER_INGEST_QUEUE_BACKEND: ${RUNTIME_OBSERVER_INGEST_QUEUE_BACKEND:-sqs}
      RUNTIME_OBSERVER_SQS_QUEUE_URL: ${RUNTIME_OBSERVER_SQS_QUEUE_URL:?RUNTIME_OBSERVER_SQS_QUEUE_URL is required}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    ports:
      - "4319:4319"
    volumes:
      - .:/app
    command: >
      sh -c "pip install --no-cache-dir -e . && runtime-observer-server --host 0.0.0.0 --port 4319"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:4319/', timeout=5).read()\nPY"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pg-data:
