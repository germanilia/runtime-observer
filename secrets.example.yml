# Runtime Observer server secrets.
# Copy to secrets.yml on the collector host. secrets.yml is ignored by git.

database:
  # SQLite connection string. Use an absolute path in production deployments.
  url: sqlite:///collector/runtime_observer.sqlite3

auth:
  # Optional legacy/admin automation key. SDK ingest keys should be generated
  # per project in the dashboard and are stored hashed in the database.
  admin_api_key: ""
